services:
  postgres:
    image: postgres:16-alpine
    container_name: achieveme-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: achieveme
      POSTGRES_PASSWORD: achieveme
      POSTGRES_DB: achieveme
    volumes:
      - achieveme_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U achieveme -d achieveme"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  achieveme_pg_data:
